name: TTS Test (Gun 1)

# Elle tetiklenir. script_parse.py + google_tts_generate.py'yi gun 1 icin
# calistirir, uretilen voiceover.mp3'u indirilebilir "artifact" olarak sunar.
on:
  workflow_dispatch:

jobs:
  test-tts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Google credential dosyasini olustur
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json

      - name: Script'i ayristir (Gun 1)
        run: python script_parse.py 1

      - name: Seslendirmeyi uret (Gun 1)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: google_credentials.json
        run: python google_tts_generate.py 1

      - name: Sonucu artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: voiceover-gun1
          path: output/video_01/voiceover.mp3
